name: LinkedIn Automation

on:
  schedule:
    - cron: "30 3 * * *" # 09:00 IST daily
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: linkedin-automation-daily
  cancel-in-progress: true

jobs:
  outreach:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONUNBUFFERED: "1"
      TZ: Asia/Kolkata

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Restore invite database cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/agent_state.db
            data/agent_state.db-shm
            data/agent_state.db-wal
          key: linkedin-db-${{ github.run_id }}
          restore-keys: |
            linkedin-db-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # undetected-chromedriver still imports distutils (removed in Python 3.12)
          python-version: "3.11"
          cache: pip

      - name: Install Google Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v2
        with:
          install-chromedriver: true

      - name: Export Chrome path
        run: |
          echo "CHROME_PATH=${{ steps.chrome.outputs.chrome-path }}" >> "$GITHUB_ENV"
          echo "CHROMEDRIVER_PATH=${{ steps.chrome.outputs.chromedriver-path }}" >> "$GITHUB_ENV"
          echo "Chrome path: ${{ steps.chrome.outputs.chrome-path }}"
          echo "ChromeDriver path: ${{ steps.chrome.outputs.chromedriver-path }}"

      - name: Build .env from GitHub Secrets
        env:
          LINKEDIN_LI_AT: ${{ secrets.LINKEDIN_LI_AT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          required = ["LINKEDIN_LI_AT", "TELEGRAM_BOT_TOKEN", "TELEGRAM_CHAT_ID"]
          missing = [name for name in required if not os.getenv(name)]
          if missing:
              raise SystemExit(f"Missing required GitHub secrets: {', '.join(missing)}")

          li_at = os.environ["LINKEDIN_LI_AT"].strip()
          if (li_at.startswith('"') and li_at.endswith('"')) or (li_at.startswith("'") and li_at.endswith("'")):
              li_at = li_at[1:-1].strip()
          if li_at.lower().startswith("li_at="):
              li_at = li_at.split("=", 1)[1]
          if ";" in li_at:
              li_at = li_at.split(";", 1)[0]
          li_at = li_at.strip()

          if not li_at:
              raise SystemExit("LINKEDIN_LI_AT secret is blank after normalization")

          print(f"LINKEDIN_LI_AT normalized length: {len(li_at)}")

          lines = [
              f"LINKEDIN_LI_AT={li_at}",
              f"TELEGRAM_BOT_TOKEN={os.environ['TELEGRAM_BOT_TOKEN']}",
              f"TELEGRAM_CHAT_ID={os.environ['TELEGRAM_CHAT_ID']}",
              f"GEMINI_API_KEY={os.getenv('GEMINI_API_KEY', '')}",
              "HEADLESS=true",
              "DAILY_INVITE_LIMIT=14",
              "SCHEDULE_TIME=09:00",
              "PRIORITY_LOCATIONS=United States,Canada,Australia",
              "MIN_DELAY=3",
              "MAX_DELAY=8",
          ]

          Path('.env').write_text("\n".join(lines) + "\n", encoding='utf-8')
          print("Created .env for automation run")
          PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Preflight diagnostics
        run: |
          python --version
          echo "CHROME_PATH=${CHROME_PATH}"
          echo "CHROMEDRIVER_PATH=${CHROMEDRIVER_PATH}"
          if [ -n "${CHROME_PATH}" ]; then
            "${CHROME_PATH}" --version || true
          fi
          if [ -n "${CHROMEDRIVER_PATH}" ]; then
            "${CHROMEDRIVER_PATH}" --version || true
          fi
          google-chrome --version || true
          python - <<'PY'
          from config import config
          print(f"HEADLESS={config.HEADLESS}")
          print(f"DAILY_INVITE_LIMIT={config.DAILY_INVITE_LIMIT}")
          print(f"PRIORITY_LOCATIONS={config.PRIORITY_LOCATIONS}")
          print(f"LINKEDIN_LI_AT length={len(config.LINKEDIN_LI_AT)}")
          print(f"LINKEDIN_LI_AT starts_with_li_at={config.LINKEDIN_LI_AT.lower().startswith('li_at=')}")
          errs = config.validate()
          print(f"Config validation errors={errs}")
          PY

      - name: Run outreach now
        run: |
          set -o pipefail
          python main.py --run-now 2>&1 | tee run_output.log

      - name: Upload outreach log artifact
        if: always() && hashFiles('run_output.log') != ''
        uses: actions/upload-artifact@v4
        with:
          name: outreach-log-${{ github.run_id }}
          path: run_output.log

      - name: Upload debug snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-snapshots-${{ github.run_id }}
          path: |
            data/debug/*.png
            data/debug/*.html
          if-no-files-found: ignore

      - name: Save invite database cache
        if: always() && hashFiles('data/agent_state.db') != ''
        uses: actions/cache/save@v4
        with:
          path: |
            data/agent_state.db
            data/agent_state.db-shm
            data/agent_state.db-wal
          key: linkedin-db-${{ github.run_id }}

      - name: Telegram fallback on workflow failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_REPO: ${{ github.repository }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram fallback skipped (missing secrets)."
            exit 0
          fi

          RUN_URL="https://github.com/${GH_REPO}/actions/runs/${GH_RUN_ID}"
          MSG="LinkedIn Automation workflow failed on ${GH_REF_NAME}. Check run + artifact log: ${RUN_URL}"

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "disable_web_page_preview=true"
